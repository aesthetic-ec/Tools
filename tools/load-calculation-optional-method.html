<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Load Calculator — Aesthetic E Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ============================================
   BRAND PALETTE 
============================================ */
:root {
  --charcoal: #1a1a1a;   
  --white:    #ffffff;   
  --silver:   #8e8e8e;   
  --light1:   #f5f5f5;   
  --light2:   #ebebeb;   
  --border:   #c8c8c8;   
  --green:    #1f6b42;   
  --red:      #b83232;   
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--white);
  color: var(--charcoal);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   NAV 
============================================ */
nav.site-nav {
  background-color: var(--charcoal) !important;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 40px;
  position: sticky;
  top: 0;
  z-index: 9999;
  width: 100%;
}
.nav-brand { display: flex; align-items: center; gap: 12px; }
.nav-logo {
  width: 28px; height: 28px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}
.nav-name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white);
}
.nav-back {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--silver);
  border: 1px solid #444;
  padding: 4px 12px;
  border-radius: 20px;
  text-decoration: none;
  transition: color 0.18s;
}
.nav-back:hover { color: var(--white); }

/* ============================================
   HERO 
============================================ */
.hero {
  padding: 52px 40px 36px;
  max-width: 900px;
  margin: 0 auto;
}
.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 16px;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 76px;
  line-height: 0.92;
  letter-spacing: 0.02em;
  color: var(--charcoal);
  margin-bottom: 16px;
}
.hero-sub {
  font-size: 15px;
  color: var(--silver);
  font-weight: 300;
  line-height: 1.65;
  max-width: 480px;
}

/* ============================================
   CONTENT WRAPPER
============================================ */
.content {
  max-width: 900px;
  margin: 40px auto 0;
  padding: 0 40px 80px;
}

.section { margin-bottom: 52px; }
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 22px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--charcoal) !important;
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.06em;
  color: var(--charcoal);
}
.section-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 0.07em;
}

/* ============================================
   CALCULATOR STYLES (Adapted to Brand)
============================================ */
.calc-wrapper {
  background: var(--light1);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 30px;
}

.input-group {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border);
}

.input-group:last-child {
  border-bottom: none;
}

label {
  flex: 1;
  font-weight: 500;
  font-size: 15px;
  color: var(--charcoal);
}

.sub-text {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 0.05em;
  font-weight: normal;
  margin-top: 4px;
}

input[type="number"] {
  width: 120px;
  padding: 10px;
  font-size: 14px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  border-radius: 4px;
  text-align: right;
  background: var(--white);
  color: var(--charcoal);
  transition: border-color 0.18s;
}

input[type="number"]:focus {
  outline: none;
  border-color: var(--charcoal);
}

.result-box {
  background: #edf7f1; /* Soft brand green */
  border: 1px solid var(--green);
  padding: 24px;
  border-radius: 6px;
  text-align: center;
  margin-top: 30px;
}

.result-box h3 {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.05em;
  margin: 0 0 16px 0;
  font-size: 24px;
  color: var(--green);
}

.final-amps {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  letter-spacing: 0.02em;
  color: var(--green);
  line-height: 1;
  margin-bottom: 4px;
}

.calculation-step {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: var(--silver);
  margin-bottom: 8px;
}

.calculation-step span:last-child {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

.bold-step {
  font-weight: 600;
  color: var(--charcoal);
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.bold-step span:last-child {
  font-size: 14px;
  font-weight: bold;
}

/* ============================================
   FOOTER
============================================ */
footer.site-footer {
  background-color: var(--charcoal) !important;
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 0.08em;
}
.footer-logo {
  width: 22px; height: 22px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.35;
}

/* ============================================
   RESPONSIVE
============================================ */
@media (max-width: 640px) {
  nav.site-nav { padding: 14px 20px; }
  .hero { padding: 36px 20px 24px; }
  .hero-title { font-size: 52px; }
  .content { padding: 0 20px 60px; }
  .input-group { flex-direction: column; align-items: flex-start; gap: 10px; }
  input[type="number"] { width: 100%; }
  footer.site-footer {
    padding: 16px 20px;
    flex-direction: column;
    gap: 8px;
    text-align: center;
  }
}

</style>
</head>
